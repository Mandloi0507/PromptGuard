<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}PromptGuard{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080c10; --surface: #0d1117; --border: #1e2a38;
      --accent: #00e5ff; --danger: #ff3b5c; --warn: #ffb300;
      --safe: #00e676; --text: #cdd9e5; --muted: #4a5568;
      --font-mono: 'Share Tech Mono', monospace;
      --font-ui: 'Rajdhani', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif; min-height: 100vh;
    }
    nav {
      display: flex; align-items: center; gap: 2rem;
      padding: 0 2rem; height: 60px;
      background: rgba(13,17,23,0.95);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-brand {
      font-family: var(--font-ui); font-weight: 700; font-size: 1.1rem;
      color: var(--accent); letter-spacing: 0.1em; text-decoration: none;
    }
    .nav-links { display: flex; gap: 0.25rem; margin-left: auto; }
    .nav-links a {
      font-family: var(--font-ui); font-weight: 600; font-size: 0.85rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--muted); text-decoration: none;
      padding: 0.4rem 1rem; border-radius: 4px;
      border: 1px solid transparent; transition: all 0.2s;
    }
    .nav-links a:hover, .nav-links a.active {
      color: var(--accent); border-color: rgba(0,229,255,0.3);
      background: rgba(0,229,255,0.05);
    }
    .page { max-width: 900px; margin: 0 auto; padding: 2.5rem 1.5rem; }
    .page-title {
      font-family: var(--font-ui); font-size: 2rem; font-weight: 700;
      color: #fff; letter-spacing: 0.05em; margin-bottom: 0.4rem;
    }
    .page-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 1.5rem; margin-bottom: 1.25rem;
    }
    textarea, input[type="text"] {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-family: var(--font-mono);
      font-size: 0.9rem; padding: 0.85rem 1rem; resize: vertical; outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus, input:focus { border-color: var(--accent); }
    .btn {
      font-family: var(--font-ui); font-weight: 700; font-size: 0.9rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0.65rem 1.75rem; border: none; border-radius: 5px; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .badge {
      display: inline-block; font-family: var(--font-ui); font-weight: 700;
      font-size: 0.75rem; letter-spacing: 0.1em; padding: 0.2rem 0.6rem;
      border-radius: 3px; text-transform: uppercase;
    }
    .badge-block { background: rgba(255,59,92,0.15); color: var(--danger); border: 1px solid rgba(255,59,92,0.3); }
    .badge-warn  { background: rgba(255,179,0,0.15);  color: var(--warn);   border: 1px solid rgba(255,179,0,0.3); }
    .badge-allow { background: rgba(0,230,118,0.15);  color: var(--safe);   border: 1px solid rgba(0,230,118,0.3); }
    .risk-bar-wrap { margin: 1rem 0; }
    .risk-bar-label {
      display: flex; justify-content: space-between;
      font-family: var(--font-mono); font-size: 0.8rem;
      color: var(--muted); margin-bottom: 0.4rem;
    }
    .risk-bar-track { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .risk-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
    .loader { display: none; gap: 0.3rem; align-items: center; font-family: var(--font-mono); font-size: 0.8rem; color: var(--muted); margin-top: 0.75rem; }
    .loader.active { display: flex; }
    .loader-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 1s infinite; }
    .loader-dot:nth-child(2) { animation-delay: 0.2s; }
    .loader-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,100%{opacity:0.2;transform:scale(0.8)} 50%{opacity:1;transform:scale(1.2)} }
    .reasons { list-style: none; margin-top: 0.75rem; }
    .reasons li { font-family: var(--font-mono); font-size: 0.8rem; color: var(--muted); padding: 0.35rem 0; border-bottom: 1px solid var(--border); display: flex; gap: 0.5rem; }
    .reasons li::before { content: '→'; color: var(--accent); flex-shrink: 0; }
    .reasons li:last-child { border-bottom: none; }
    .result-hidden { display: none; }
    .llm-box { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 1rem; font-size: 0.88rem; line-height: 1.65; white-space: pre-wrap; margin-top: 1rem; max-height: 300px; overflow-y: auto; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; text-align: center; }
    .stat-num { font-family: var(--font-ui); font-size: 2.2rem; font-weight: 700; line-height: 1; }
    .stat-label { font-family: var(--font-mono); font-size: 0.7rem; color: var(--muted); margin-top: 0.35rem; text-transform: uppercase; letter-spacing: 0.08em; }
    .log-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .log-table th { font-family: var(--font-ui); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; font-size: 0.72rem; color: var(--muted); padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); text-align: left; }
    .log-table td { padding: 0.6rem 0.75rem; border-bottom: 1px solid rgba(30,42,56,0.5); font-family: var(--font-mono); font-size: 0.78rem; vertical-align: middle; }
    .section-title { font-family: var(--font-ui); font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; }
    label { font-family: var(--font-ui); font-size: 0.8rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 0.4rem; }
    select { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--font-mono); font-size: 0.85rem; padding: 0.55rem 0.85rem; outline: none; cursor: pointer; }
    select:focus { border-color: var(--accent); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="nav-brand">⬡ PromptGuard</a>
  <div class="nav-links">
    <a href="/" class="{% block nav_analyser %}{% endblock %}">Analyser</a>
    <a href="/firewall/" class="{% block nav_firewall %}{% endblock %}">Live Firewall</a>
    <a href="/dashboard/" class="{% block nav_dashboard %}{% endblock %}">Dashboard</a>
  </div>
</nav>
{% block content %}{% endblock %}
<script>
  function getCookie(name){
    const match=document.cookie.match(new RegExp('(^| )'+name+'=([^;]+)'));
    return match?decodeURIComponent(match[2]):null;
  }
  function makeBadge(text,className){
    const span=document.createElement('span');
    span.className=className;
    span.textContent=text;
    span.style.marginRight='0.4rem';
    return span;
  }
  function replaceChildrenTextList(container,items,emptyText){
    container.replaceChildren();
    if(!items || !items.length){
      const li=document.createElement('li');
      li.textContent=emptyText;
      container.appendChild(li);
      return;
    }
    items.forEach(item=>{
      const li=document.createElement('li');
      li.textContent=item;
      container.appendChild(li);
    });
  }
</script>
</body>
</html>
